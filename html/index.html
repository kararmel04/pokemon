<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <script src="data/type_effectiveness.js"></script>
        <script src="data/pokemons.js"></script>
        <script src="data/pokemon_types.js"></script>
        <script src="data/class_types.js"></script>
        <script src="data/charged_moves.js"></script>
        <script src="data/fast_moves.js"></script>
        <script src="data/pokemon_moves.js"></script>
        <script src="data/class_attack.js"></script>
        <script src="data/class_pokemon.js"></script>
        <script src="test/test.js"></script>
        <script src="js/jquery-3.7.1.js"></script>
        <script src="js/script.js"></script>
    </head>
    <body>
        <div class="filtres">
            <strong><p>Filtres :</p></strong>
            <div class="type">
                <label for="types">Type :</label>
                <select name="types" id="type">
                    <option value="-">-</option>
                    <option value="Water">Attaque 1</option>
                    <option value="Insect">Attaque 2</option>
                </select>
            </div>
            <div class="atk">
                <label for="Attaques Rapides">Attaque :</label>
                <select name="Attaques Rapides" id="fast">
                    <option value="-">-</option>
                    <option value="Attack 1">Attaque 1</option>
                    <option value="Attack 2">Attaque 2</option>
                </select>
            </div>
            <textarea id="name">Entrer un nom...</textarea>

        </div>
        <table>
            <thead>
                <th>Id</th>
                <th>Nom</th>
                <th>Génération</th>
                <th>Types</th>
                <th>STA</th>
                <th>ATK</th>
                <th>DEF</th>
                <th>Image</th>
            </thead>
            <tr class="hover">
                <td>1</td>
                <td>Bulbasaur</td>
                <td>undefined</td>
                <td>Normal</td>
                <td>100</td>
                <td>50</td>
                <td>30</td>
                <td><img src="webp/images/001.webp" alt="bulbasaur image" title="bulbasaur image" width="32px" height="32px"></td>
            </tr>
        </table>
        <div class="pagination">
            <button id="prev-btn">Précédent</button>
            <span id="page-info">Page 1 / 1</span>
            <button id="next-btn">Suivant</button>
        </div>
    </body>
</html>
